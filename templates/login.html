<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信仰版 Duolingo - 登入</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center style-container" style="min-height: 100vh;">
        <div class="card p-4 shadow-sm mx-2 my-4" style="width: 100%; max-width: 400px; border-radius: 12px;">
            <h2 class="text-center mb-4 text-primary fw-bold" style="font-size: 26px;">🙏 信仰版 Duolingo</h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-danger p-2 text-center" style="font-size: 14px;">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">帳號名稱：</label>
                    <input type="text" name="username" class="form-control" required placeholder="請輸入真實姓名或牧區帳號">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">密碼：</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3" style="border-radius: 8px;">登入系統</button>
                <div class="text-center mb-2">
                    <a href="{{ url_for('forgot_password') }}" class="text-decoration-none text-danger" style="font-size: 14px;">🔑 忘記密碼？點此重設</a>
                </div>
                <div class="text-center">
                    <a href="{{ url_for('register') }}" class="text-decoration-none text-secondary" style="font-size: 14px;">🌱 還沒有帳號？點此註冊</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
