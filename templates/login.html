<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光之城青年牧區 - 登入</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'PingFang TC', sans-serif; }
        .login-card { max-width: 400px; margin: 80px auto; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card p-4 bg-white">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">🏰 光之城青年牧區</h3>
                <p class="text-muted small">信仰版 Duolingo 系統上線</p>
            </div>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for msg in messages %}
                        <div class="alert alert-danger py-2 small text-center">{{ msg }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold">契友姓名</label>
                    <input type="text" name="username" class="form-control" placeholder="請輸入您的真實姓名" required autocomplete="off">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">密碼</label>
                    <input type="password" name="password" class="form-control" placeholder="請輸入密碼" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3 rounded-pill">安全登入 🚀</button>
            </form>
            
            <div class="text-center small mt-2">
                <a href="{{ url_for('register') }}" class="text-decoration-none">還沒有帳號？立即註冊 ✨</a>
                <span class="text-muted mx-2">|</span>
                <a href="{{ url_for('forgot_password') }}" class="text-danger text-decoration-none">忘記密碼？🔒</a>
            </div>
        </div>
    </div>
</body>
</html>
