<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光之城青年牧區 - 安全重設密碼</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'PingFang TC', sans-serif; }
        .forgot-card { max-width: 430px; margin: 60px auto; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card forgot-card p-4 bg-white">
            <div class="text-center mb-3">
                <h4 class="fw-bold text-danger">🔒 安全身分驗證</h4>
                <p class="text-muted small">必須回答正確的防盜提示問題，才可重設密碼</p>
            </div>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for msg in messages %}
                        <div class="alert alert-danger py-2 small text-center">{{ msg }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold">要重設密碼的契友姓名</label>
                    <input type="text" name="username" class="form-control" placeholder="請輸入您的名字" required autocomplete="off">
                </div>
                
                <div class="mb-3 p-3 bg-light rounded-3 border border-danger-subtle">
                    <label class="form-label small fw-bold text-danger">🛡️ 安全問題挑戰</label>
                    <input type="text" class="form-control bg-white mb-2 small" value="問題：您最喜歡的聖經人物是什麼？" disabled>
                    <input type="text" name="security_answer" class="form-control" placeholder="請輸入註冊時填寫的正確答案" required autocomplete="off">
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold">設定新密碼</label>
                    <input type="password" name="new_password" class="form-control" placeholder="請輸入新密碼" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">再次確認新密碼</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="請再次輸入新密碼" required>
                </div>

                <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mb-2 rounded-pill">驗證並修改密碼 🔑</button>
            </form>
            <div class="text-center small mt-3">
                <a href="{{ url_for('login') }}" class="text-decoration-none text-muted">取消並返回登入</a>
            </div>
        </div>
    </div>
</body>
</html>
