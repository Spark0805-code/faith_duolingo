<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光之城青年牧區 - 註冊</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'PingFang TC', sans-serif; }
        .register-card { max-width: 430px; margin: 60px auto; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card register-card p-4 bg-white">
            <div class="text-center mb-3">
                <h3 class="fw-bold text-success">✨ 新增契友帳號</h3>
                <p class="text-muted small">請填寫真實資料以加入每週隨機挑戰</p>
            </div>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for msg in messages %}
                        <div class="alert alert-danger py-2 small text-center">{{ msg }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold">契友真實姓名</label>
                    <input type="text" name="username" class="form-control" placeholder="範例：王小明" required autocomplete="off">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">設定密碼</label>
                    <input type="password" name="password" class="form-control" placeholder="請設定您的密碼" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">再次確認密碼</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="請再次輸入密碼" required>
                </div>
                
                <!-- 🛡️ 安全機制：註冊時存入暗號 -->
                <div class="mb-3 p-3 bg-light rounded-3 border">
                    <label class="form-label small fw-bold text-primary">🔒 帳號防盜安全問題</label>
                    <div class="form-text text-muted mb-2 small">未來遺忘密碼時，必須回答正確才能重設。</div>
                    <input type="text" class="form-control bg-white mb-2" value="問題：您最喜歡的聖經人物是什麼？" disabled>
                    <input type="text" name="security_answer" class="form-control" placeholder="請輸入您的答案（如：大衛、保羅）" required autocomplete="off">
                </div>

                <button type="submit" class="btn btn-success w-100 fw-bold py-2 mb-2 rounded-pill">送出註冊，開始挑戰 🏃‍♂️</button>
            </form>
            <div class="text-center small mt-3">
                <a href="{{ url_for('login') }}" class="text-decoration-none text-muted">已有帳號？返回登入</a>
            </div>
        </div>
    </div>
</body>
</html>
