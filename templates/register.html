<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信仰版 Duolingo - 註冊</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card p-4 shadow-sm mx-2 my-4" style="width: 100%; max-width: 400px; border-radius: 12px;">
            <h2 class="text-center mb-4 text-success fw-bold" style="font-size: 24px;">🌱 建立新契友帳號</h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-danger p-2 text-center" style="font-size: 14px;">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">真實姓名：</label>
                    <input type="text" name="username" class="form-control" required placeholder="例如：張繼榮">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">設定密碼：</label>
                    <input type="password" name="password" class="form-control" required placeholder="請輸入密碼">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">確認密碼：</label>
                    <input type="password" name="confirm_password" class="form-control" required placeholder="請再次輸入密碼">
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-bold mb-3" style="border-radius: 8px;">註冊並登入</button>
                <div class="text-center">
                    <a href="{{ url_for('login') }}" class="text-decoration-none text-secondary" style="font-size: 14px;">已有帳號？返回登入</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
